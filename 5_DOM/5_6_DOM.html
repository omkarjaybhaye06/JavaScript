<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body>
    <div class="parent">
      <div class="day">Monday</div>
      <div class="day">Tuesday</div>
      <div class="day">Wednesday</div>
      <div class="day">Thursday</div>
    </div>
  </body>
  <script>
    const parent1 = document.querySelector(".parent"); //selects the class with name parent
    // console.log(parent1); //prints whole parent class and its childrens
    // console.log(parent1.children); //displays array type HTMLCollection with all childrens details //Note .children here is a property
    // console.log(parent1.children[1]); //prints whole day class of Tuesday
    // console.log(parent1.children[1].innerHTML); //prints only Tuesday i.e text inside child class day of tuesday

    for (let i = 0; i < parent1.children.length; i++) {
      console.log(parent1.children[i].innerHTML); //prints Monday Tuesday Wednesday Thursday
    }

    //few properties in DOM
    parent1.children[1].style.color = "yellow"; //changes color of Tuesday to yellow in ui
    console.log(parent1.firstElementChild); //prints class of Monday
    console.log(parent1.lastElementChild); //prints class of Thursday
  </script>
</html>
