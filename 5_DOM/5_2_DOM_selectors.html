<!-- DOM Selectors: DOM selectors are methods used to select and manipulate elements in the DOM.
They allow you to access specific elements based on their tag name, class, id, or other attributes. Common DOM selectors include:
- getElementById: Selects an element by its unique ID.
- getElementsByClassName: Selects all elements with a specific class name.
- getElementsByTagName: Selects all elements with a specific tag name.
- querySelector: Selects the first element that matches a specified CSS selector.
- querySelectorAll: Selects all elements that match a specified CSS selector. -->
